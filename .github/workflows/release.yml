name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # npm >=11.5.1 required for OIDC trusted publishing
      - run: npm install -g npm@11.5.1
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - run: npm test
      # verity gates its own release against its own claims manifest
      - run: node dist/cli.js verify
      # --access public: @pietro-falco/verity is scoped, and scoped packages
      # default to a restricted (private) publish
      - run: npm publish --provenance --access public
